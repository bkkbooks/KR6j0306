body:
  text: 師子國三藏阿目佉奉詔譯如是我聞一時佛在淨居天中與諸天大衆淨居天王伊首羅天王魔醯首羅天王大梵天王帝釋天王及諸天衆寶蓮華師子之座而說妙法踰如日光照明一切爾時觀世音菩薩摩訶薩歡喜踴躍即從座起偏袒右肩合掌恭敬禮佛足已整理衣服長跪叉手前白佛言世尊我有陀羅尼名不空羂索心王陀羅尼真言三昧耶法乃往過去九十一劫彼最後劫中有佛出世名世間自在王如來應正等覺明行圓滿善逝世間解無上士調御丈夫天人師薄伽梵彼佛世尊憐愍我故授是陀羅尼密言一切法門其佛世界名曰勝觀察惠世尊我從是已來常受持此陀羅尼真言一切法教導化無量百千衆生所謂淨居天王伊首羅天王魔醯首羅天王大梵天王帝釋天王一切天王各并眷屬恭敬供養尊重讚歎皆令住於阿耨多羅三藐三菩提俱以離疑網智而莊嚴之世尊我初得是陀羅尼法時證得百千不空無惑智莊嚴首三摩地門而皆現前世尊由斯真言之力現見十方無量無數種種剎土諸佛如來所有會衆而皆供養聽聞深法展轉教化無量有情皆得發趣無上菩提是故智者應當受持世尊若此經典所作方處當知其地即有無量百千淨居天王伊首羅天王大梵天王帝釋天王及諸一十二萬百千天王并其眷屬常共擁護恭敬圍繞世尊若斯經典所在方處有能依法清淨書寫讀誦受持讚歎之者當知其地即是一切諸佛全身制底世尊若諸有情暫能讀誦聽聞流行此不空羂索心王陀羅尼真言三昧耶者當知是人則當親近恭敬供養無量俱胝那庾多百千諸佛於諸佛所種諸善根所以者何此法乃是一切諸佛菩提寶聚世尊若有有情造極惡業謗讟一切諸佛菩薩獨覺聲聞及謗正法言無有善或復破滅諸佛菩薩獨覺聲聞及謗形像塔廟經論教法是應墮阿毗地獄經無數劫受無間苦諸佛菩薩獨覺聲聞雖具神通亦不能救世尊如斯有情能生悔心清潔澡浴以香塗身著鮮潔衣如法佛前至誠懺悔過去今生所造重罪終更不犯受持齊戒清淨其心七日七夜誡斷諸論於不空羂索觀世音菩薩前每日誦此陀羅尼真言一百八遍者當知其人先世所造十惡五逆四重諸罪悉滅無餘不墮地獄惟除五逆現世輕受云何證知所謂一日二日三日四日乃至七日瘧病熱病或患眼耳鼻舌齗牙齒頭背兩肩心肚脅肋腰髀兩膝痔痢霍亂手腳煩疼白癩風疽疥癬癰腫遊腫癤腫毒腫癀病㿃門瘡皰癢癲厭蠱等病或為鬼神之所嬈亂或為人民種種譏謗橫加罵辱鞭撻楚楚閉受諸苦惱遭餘惡事或夢不祥世尊此人以是輕受能攘地獄一切劇苦重報之罪何況淨信輕罪有情受持此陀羅尼真言不成就耶若有情身心不安為於種種災厄怖畏惡夢不祥日日清潔讀誦受持燒香供養者則得消滅世尊若有善男子善女人如法書寫受持讀誦聽聞是法為人如法宣說讚歎教他書寫受持讀誦廣令一切胎卵濕化有情得聞此陀羅尼真言三昧耶者皆得解脫一切罪障是善男子善女人等當淨其心如理思惟以無所得智無方處智無我無人無受者智無分別智無生無滅智不遲行智無作無染智平等性智離五蘊色聲香味觸法無取無捨精進智以是種種真如巧智制御於心而為方便觀念諸佛常見目前不久當得十方百千一切諸佛一時現前摩頂讚歎為作證明或復夢覺得見好相或得諸佛變作沙門與授菩薩增上戒品令滅無量百千微塵數劫一切重罪乃至如法書寫是經安置宅中以諸香華隨心供養尊重禮拜所得功德亦復如是世尊是今且略說少分之耳若有情為勝他心嫉妬諂誑或為恐怖財利輕戲依他之心讀誦聽聞此陀羅尼真言三昧耶者皆獲勝利或復聞以誹謗輕毀而不恭敬亦獲勝利世尊今此利益唯大智者知乃是世間自在王如來威神之力乃是觀世音大慈悲力令諸惡輩一切有情一經於耳譡種殖無量善根所以者何世尊譬如有人以癡惡心行詣龍腦香林或諸香林以愚癡智種種罵香復恚心謗言此香實無香氣取香斫截搗碎為末和水飲噉或塗身上是香無心不言彼人而輕置我以是香性能熏一切無香之物芬馥皆香世尊此不空羂索心王陀羅尼真言三昧耶亦復如是若諸有情說無因果種種誹謗求非過惡或為嫉妬諂曲財食一切厄難受持讀誦而作供養由是因緣得大善根從此身後於所生處常得戒香定香慧香解脫香威德無畏福智資糧香一切菩提堅固不壞福聚蘊香所生之處貴族種姓福聚圓滿戒慧嚴身常能饒益世尊若善男子善女人受持讀誦此陀羅尼者應白月八日或十四日或十五日清淨澡浴以香塗身著淨衣服或復不食斷諸談論於不空羂索觀世音菩薩前如法而坐燒衆名香瞻菩薩面誦此陀羅尼七七遍或一百八遍世尊當知是人現世之中則得二十種功德勝利何名二十一者身無衆病若有宿業病生速令除滅二者身膚細軟姝娧妙好三者恆為衆人觀視愛樂不相厭怠四者六根常定財寶自然五者不為劫賊侵奪衣服財寶六者不為水火焚漂一切財寶七者不為侵陵殺害強取財寶令飢餓死八者不為崖岸自墜死九者加持淨水灑散一切果實苗稼惡風霜雹蟲獸之類悉不災難苗稼滋茂十者不為軍陳鬪諍而殺害死十一者不為世間諸惡鬼神吸噉精氣怨讐害死十二者常為衆人讚歎稱譽更相戀慕不值惡時死十三者若見一切外道惡人自然和睦十四者不為一切惡人誹謗謀害若有起者速自便滅十五者恆無怕怖一切人非人等十六者不為世間厭蠱呪詛荼枳尼鬼而得便死十七者一切諸惡隨眠煩惱自然消滅十八者不為水火焚漂刀箭毒藥毒蟲殃害身死十九者一切諸天常當守護二十者當所生處具大慈大悲大喜大捨四無礙心世尊復有八法何名為八一者臨命終時觀世音菩薩自變現身作沙門相善權導引將詣佛剎二者臨命終時體不疼痛去住自在如入禪定三者臨命終時眼不謾顧現惡死相四者臨命終時手腳安穩右脅臥死五者臨命終時不失大小便利惡痢血死六者臨命終時不失正念而不面臥端坐座死七者臨命終時種種談說深妙之法乃壽終死八者臨命終時願生佛剎隨願往生諸佛淨剎蓮華化生常覩一切諸佛菩薩摩訶薩衆恆不退轉世尊若有有情深樂此法即便為說或有發心盡求是法受持讀誦亦不慳吝依法廣為分別解釋何以故菩薩者於諸有情常起悲智僥無慳惜嫉妬之心乃得修治無上法故又菩薩者恆為有情勤修善法是故得名真是菩薩言菩提薩埵者何謂也菩提名智薩埵名悲普示方便之衆義也此二法荷濟有情乃得名為菩提薩埵世尊若譡許我我當為利益一切有情乃至邪見斷見惡慧衆生等我今欲於如來前說是不空羂索心王陀羅尼真言三昧耶願垂納受爾時釋迦牟尼如來告觀世音菩薩摩訶薩言善男子汝當說之今正是時如來亦喜我加被汝今為利益惡世一切垢重鮮福有情及為新學菩薩住大乘者廣作利樂施為佛事爾時觀世音菩薩摩訶薩蒙佛聽許熙怡微笑合掌恭敬瞻仰如來目不暫捨白言世尊如來今以聽許我說是不空羂索心王母陀羅尼真言三昧耶此三昧耶者乃是一切菩薩摩訶薩同共修治至解脫處我今哀愍世間利樂安樂無量有情說是神呪若受持者應先敬禮正真行慈氏菩薩摩訶薩衆敬禮金色光明吼聲自在王如來應正等覺敬禮師子遊戲王如來敬禮無量光如來案梵本文若略誦持則略敬禮佛菩薩等當從慈氏菩薩下略至敬禮無量光如來從無量光如來略至敬禮佛法僧寶等處敬禮善往摩尼寶積王如來敬禮普光明讚歎功德積王如來敬禮勝觀如來敬禮寶髻如來敬禮世間自在王如來敬禮捨離損壞蘊如來敬禮金色身寂如來敬禮飲光如來敬禮能寂如來敬禮善名稱如來敬禮普光明勝怨敵德如來敬禮帝幢德如來敬禮寶光明自在王如來敬禮無礙藥王如來敬禮勇猛遊步如來敬禮善住無畏如來敬禮佛寶法寶苾芻僧寶敬禮聖觀自在菩薩摩訶薩大悲者敬禮如是諸聖者以誦聖觀自在菩薩摩訶薩不空羂索心王母陀羅尼密言爾時聖觀自在菩薩即先入定諦觀母陀羅尼真言字句皆如金色光明晃耀照十方界從三昧起即說不空羂索心王母陀羅尼密言曰曩莫敬禮噻底哩二合耶三特嚩𭉏尼故反世誐哆過去鉢囉二合底瑟恥二合帝現前弊耶二合曩莫敬禮薩嚩一切母馱佛步提娑底𡀎二合菩薩弊耶二合曩莫薩嚩敬禮一切鉢囉二合底曳迦母馱獨覺阿哩耶聖者失囉嚩迦聲聞僧祇曳二合衆鼻庾二合阿底哆引過去曩誐多未來鉢囉二合底庾二合嘚半二合寧毗耶二合現在曩莫敬禮三藐誐多去難三藐正鉢囉二合底半娜難成就曩莫敬禮舍囉捺嚩二合底吉蘇多耶舍哩子恾訶大沫坦曳智慧曩莫阿唎耶聖者昧底哩二合耶慈氏鉢囉二合母契瓢為上首等摩訶大菩提娑嘚𡀎瓢曩莽蘇靺哩拏二合金色鉢囉二合皤光𡀎曩囉儞引光焰濕嚩囉自在曷半呼囉引惹引耶王怛他揭多耶如來曩莫敬禮思孕二合何師子尾吃哩二合抳哆遊戲曷半呼囉引惹引耶引王怛他揭哆耶如來曩牟弭多皤野無量光怛他揭哆耶如來曩莽蘇鉢囉二合底瑟恥二合哆善安住莽抳據吒引囉惹耶摩尼幢王怛他蘖哆耶如來曩莫敬禮三曼多普喇濕弭光烏𭉪誐二合哆高失哩勝據吒幢曷囉惹引耶王怛他蘖多耶普光高勝幢王如來曩謨敬禮尾跛始寧勝觀察怛他誐多耶如來曩莫失棄寧火光怛他誐多耶如來曩莫尾始𭊃二合自在步微世間怛他誐多耶如來曩莫吒囉二合舉寸娜耶怛他誐哆耶曩莫迦那迦金母娜曳仙怛他誐哆耶如來曩莫迦捨野播耶迦葉怛他誐哆耶如來曩謨舍引枳耶二合母娜曳釋迦怛他誐哆耶如來曩莫蘇去鉢哩二合枳嘌二合底哆善名稱曩恾弟夜引耶怛他誐哆耶曩莫三曼哆普嚩皤娑光明尾馹多勝僧誐囉二合恾戰室哩二合曳吉祥怛他誐哆耶如來曩莫印達囉帝釋計都幢𭉪嚩二合惹相失唎二合曳吉祥怛他誐多耶如來曩莫喇坦娜寶鉢囉二合皤細光濕嚩二合攞自在囉惹耶王怛他誐多耶如來曩莫阿吡囉二合底荷哆無能壞妹灑𡁠耶二合藥囉惹耶王怛他誐多耶如來曩謨尾訖爛二合哆超誐弭寧步怛他誐多耶如來曩莫蘇鉢囉二合底引瑟恥二合哆善安住奈哩耶二合無畏怛哆誐哆耶如來曩莫薩婆怛他誐帝鼻庾二合阿攞荷𠺶鼻藥敬禮一切如來三藐三母弟鼻藥正遍知南謨喇怛娜怛囉二合夜耶敬禮三寶曩謨阿唎耶聖者嚩路枳帝觀濕嚩囉耶自在母弟薩嘚嚩耶菩薩恾訶薩嘚嚩耶摩訶薩恾賀迦嚕尼迦耶大悲者翳鼻遙二合如是曩謨噻吃哩二合嘚嚩二合作禮伊入那此魔哩耶聖者嚩路枳帝觀濕嚩囉自在母驅𭉪祇二合㗚喃口宣說阿慕伽播𮏝尸瞻反不空羂索曩恾名纈哩二合娜焰心怛他誐哆如來三姥佉對如來面前麼瑟耽說摩揭嘚輕呼鉢哩沙衆沫地曳中阿誐我弭娜寧今恾靺哆以使野二合弭曳宣說薩嚩一切迦唎野作薩嚩一切磨曳數者恐怖暝我囉乞叉羅乞叉稱自名字皤嚩都擁護薩嚩薩嘚嚩二合𡅧者一切衆生坦𭔞他唵柘囉柘囉只哩只哩主嚕主嚕摩訶迦嚕尼迦耶大悲薩囉薩囉枲哩枲哩只哩只哩比哩比哩尾哩尾哩摩訶鉢嘚莽大蓮華賀噻哆耶手迦攞迦攞枳哩枳哩舉嚕舉嚕摩訶鼠馱清淨薩嘚嚩二合耶有情翳醯曳呬姥地野二合姥地野二合馱嚩馱嚩步馱耶步馱耶迦拏迦拏枳抳枳抳舉怒舉怒毗囉莽第一鼠馱清淨薩嘚嚩耶有情迦囉迦囉枳哩枳哩舉嚕舉嚕摩訶大塞咃摩世鉢囉二合鉢哆耶得者囉者囉散者囉散