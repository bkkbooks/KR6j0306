若國土荒亂大臣謀叛他兵侵毀災疫起時先淨洗浴著新淨衣食三白食於三七日嚴持道場四角中央置香水瓮於所畿日內外清淨如法供養壇西壇北燒香散華依法坐誦此陀羅尼真言聲聲莫絶作除災法滿三七日即令國土一切人民得大安穩每日加持壇中瓮水散一切上重成持護災厄罪障自然殄滅若為鬼神卒殃失音者加持白旃檀香泥遍塗心上即還如故若無財寶飲食香華常供養者但誦持之常不間廢亦得除滅一切罪障若令家宅善神護持無災疾者每日當取蓮華一百八莖遍塗蘇蜜散白旃檀香末加持護摩每日三時時別一百八枚滿七日已即成擁護除諸災厄若欲衆人而歡喜者加持蘇蜜白旃檀香護摩一百八遍則如所願而說頌曰母陀羅尼伽陀藥能除種種災障苦等數當以弭惹耶那俱唎藥柘哩尼乾馱娜俱唎翳羅阿皤播抳躬矩麼印捺囉播畢𭌆迦乾馱畢唎禳俁藥多誐囉藥斫迦囉摩訶斫羯烏施羅苾瑟努羯囉哆藥素摩囉爾素難那精潔合治天雨和作丸丸如酸棗量首末標界而護持首末真言遍加持一千八遍便陰乾佩時加持一七遍隨上中下與佩之上者頭上頂戴之中者項上常佩持下者臂上恆佩持皆得除滅諸災厄水火毒藥之災厄種種厭蠱諸呪詛一切悉不能為害諸惡鬼神不中害和香湯浴蠲諸障若有惡風雷電霹靂數數起者加持白芥子水望彼起處一呪一散一百八遍則便除滅或加持石榴枝望所起處一呪一擬亦得除滅世尊此母陀羅尼真言最上之法但常誦持不作檀印依法供養亦得成就若欲成就此陀羅尼真言三昧耶者如法圖畫不空羂索觀世音菩薩如大自在天首戴寶冠冠上有化阿彌陀佛被鹿皮衣七寶衣服珠瓔鐶釧種種莊嚴執持器杖以淨黃土瞿摩夷香泥如法塗壇清潔畫彩中置其像幡華莊飾四角中央置香水瓶三白飲食諸果飲食敷獻供養惟除一切殘穢觸食惡律儀家百味飲食五辛酒肉皆不供養餘者盡通請召供養燒沈水香是真言者晝夜精勤如法承事常淨潔浴著淨衣服每時面東燒香散華依法趺坐觀瞻菩薩如法誦持時數不闕每白月八日應當斷食勤懇念誦時觀世音壇中現身真言者見瞻仰禮拜乞所求願皆得滿足并以雄黃或安善那置於壇中真言加持令現三相一者暖相二者煙相三者光相點額點眼點二手掌點二腳掌即證阿姥伽王神通智嚴三摩地諸有事業無不成辦爾時如來讚觀世音菩薩摩訶薩言善哉善哉善男子汝能於是天人大衆之中燃大法矩作衆寶聚挽諸有情出衆苦海皆得其本爾時淨居天王伊首囉天王摩醯首囉天王大梵天王帝釋天王及諸天衆聞說是法皆大歡喜合掌恭敬俱從座起前白佛言世尊後末世時隨在國土一切山林城邑村落若有有情如法書寫讀誦受持此不空羂索心王母陀羅尼真言三昧耶者我等天王并及眷屬晝夜集會常擁護之爾時如來告諸天王善哉善哉讀誦受持此陀羅尼真言三昧耶者應當守護而勿放捨便令修學增殖長養一切菩提福蘊善根令得阿耨多羅三藐三菩提爾時諸天聞佛告讚歡喜踊躍恭敬頂戴
