body:
  text: 祕密心密言品第二爾時觀世音菩薩摩訶薩復從座起整理衣服右膝著地合掌瞻佛顏貌熙怡心具無量大慈大悲遍身普放億千大日輪光王照于十方三千大千佛之世界靡不周遍放斯光時映徹衆色皆如金聚歡喜微笑白佛言世尊今放此光為於世間沙門婆羅門毗舍輸陀令得無量大悲之心獲諸最勝為依止處及為一切學大乘者持是不空羂索心王母陀羅尼真言三昧耶者皆獲菩提一切願果將欲廣演是不空羂索心王母陀羅尼真言三昧耶中祕密心真言三昧耶門廣大解脫蓮華曼荼羅印三昧此三昧是真實最上成就乃是一切諸大菩薩真實解脫甚深祕密三昧耶法我今欲於佛前一切天龍藥叉羅剎乾闥婆阿蘇囉蘖嚕荼緊那羅莫呼洛伽摩訶持真言明仙淨居天伊首羅天魔醯首羅天大梵天帝釋天焰魔王水天風天火天毗陛羅天大苦行仙日天月天星天二十八宿主星神天持明天女乃至一切諸天神等以住最勝曼荼羅三昧耶者前廣演開釋是出世世間祕密曼荼羅印三昧耶法令諸有情思惟讀誦受持斯法皆得最上成就一切功德是故説是根本真實解脫心王母陀羅尼真言三昧耶中祕密心真言惟垂哀愍聽我所説爾時釋迦牟尼佛如來應正等覺熙怡微笑即申百福莊嚴相好金色之手摩觀世音菩薩摩訶薩頂告大慈大悲真清淨者能為大衆闡斯妙法善男子汝今當知現在十方殑伽沙俱胝那庾多百千微塵世界所有一切如來應正等覺皆以無量神通光明加被於汝我今亦以無量神通光明覆護於汝恣汝神力説斯不空羂索心王母陀羅尼真言三昧耶中祕密心真言三昧耶爾時觀世音菩薩摩訶薩觀察十方一切大衆如大象王德無所畏即説祕密心真言曰唵一鉢𭉪摩荷噻哆二恾訶阿暮伽播捨三娑馱耶娑摩耶四紇唎娜引焰五槄柘囉柘囉六𤙖爾時觀世音菩薩摩訶薩説此真言之時其補陀洛山及三千大千世界蘇彌山王一切天宮神宮龍宮藥叉宮羅剎宮乾闥婆宮阿素洛宮伽樓羅宮緊那羅宮莫呼羅伽宮持真言仙宮皆六種震動大海江河一切泉沼皆大涌沸海中一切摩竭諸獸皆大驚怖怪未曾有十方殑伽沙俱胝那庾多百千微塵世界所有一切如來於虛空中一時皆現同聲讚言善哉善哉大悲者善能説此最勝真實不空羂索心王母陀羅尼三昧耶中祕密心真言三昧耶若但讀誦即得成就最上菩提爾時釋迦牟尼如來告觀世音菩薩摩訶薩言善男子當為大衆説此真實廣大成就祕密心真言三昧耶功德之門爾時觀世音菩薩白佛言世尊此祕密心真言三昧耶若有善男子善女人一心觀念十方一切諸佛菩薩説誠實言懺悔無始已來一切重罪唯願一切諸佛菩薩摩訶薩加祐護念我從今日乃至菩提供給承事一切諸佛菩薩摩訶薩攝澄心想觀於地下金剛輪際上置一嚩字文畫分明變為金剛出大光明其光熾盛焚燒自身燼為白灰諦想此灰變成金色持此金灰塗曼拏羅其曼拏羅光明皎徹當壇心中觀置八葉開敷蓮華於華臺上觀一娑字放金色光於其光中聖者觀世音菩薩摩訶薩從此而出現金色身顏貌熙怡左手當胸執金蓮華右手掐珠結跏趺坐一切妙寶莊嚴其身放奇特光作是觀已起大悲心讀誦受持此祕密心真言一百八遍是人則為十方殑伽沙俱胝那庾多百千微塵世界一切如來應正等覺同聲讚歎而攝受之是人於百千劫來積聚惡業一切重罪所有怨讎惡病煩惱悉皆散滅無有遺餘其觀世音菩薩即於夢中而現其身速滿諸願若修習此三昧耶者常應清淨澡浴著鮮潔衣食三白食於白月八日或十五日當斷諸食於諸有情起大悲心恆於不空羂索觀世音菩薩前以白旃檀末泥塗壇地獻諸妙華燒焯香王而為供養若在壇前正念誦時當斷諸語結印護身呪白芥子及以香水頂上散灑亦呪其手以自摩頂結灌頂印呪印頂上面向西方結跏趺坐結數珠印誦母陀羅尼真言一百八遍奮怒王真言亦一百八遍誦祕密心真言一千八遍即當更誦奮怒王真言滿百千遍若能如是依法念者定得觀世音菩薩畫像身上放諸色光光現之時其地即當六種震動其羂索手亦放光明於虛空中出衆妙聲種種讚詠是真言者頂上亦出光明證此相者即得成就此大不空羂索心王母陀羅尼真言三昧耶門一切諸法悉皆成辦是時十方殑伽沙俱胝那庾多百千微塵世界一切如來一時現身舒手摩行人頂讚歎加祐觀世音菩薩當亦出現真妙色身憐愍護念愛之如子教詔不空羂索心王母陀羅尼真言一切祕密三昧耶乃至證妙菩提不相捨離修此法者當於一切諸佛神通月修所謂正月五月九月白月一日至十五日如法清淨讀誦受持即得成就證斯法者先於一月兩月三月四月五月依法清淨調伏身心內心誦念承事供養令心清淨乃當修治曼荼羅印三昧耶則得成就頌曰世尊今當知祕密心真言神通力香王沈香黑煎香數各十六分蘇合鬱金香白檀等八分薰陸龍腦香安悉等三分嚴潔淨室中以請召真言加持香和合此香名三界最勝之不空神通香王力若燒此香時如法長跪坐手執持香爐讀誦召真言加持是香王普通皆供養十方一切佛菩薩摩訶薩真言之威力變為妙香雲宮殿之樓閣香座香臺樹香華之瓔珞香雲之衣服香幢妙幡蓋香雲諸佛事是妙香王香周至十方剎一切諸如來菩薩摩訶薩天龍藥叉衆羅剎乾闥婆阿素洛之衆蘖嚕緊那羅摩呼羅伽等前作大供養是諸聖衆等聞斯香氣者歡喜皆讚歎乃至於三塗地獄傍生界聞斯香氣者得滅衆地獄傍生諸罪障捨此身以後更此身以後更不復重受常燒此香而供養者當知是人得大勝利不為一切鬪諍兵賊惡夢口舌呪詛厭蠱諸惡怪相雷電霹靂一切藥叉羅剎惡鬼天行瘧鬼種種精鬼來相嬈惱乃至菩提除攘重業現世輕受清淨衣服食三白食菩薩像前以蘇乳酪甘美飲食蘇燈油燈一切華香獻飾供養燒斯香王以菩提心諦觀五蘊性自空寂離我我所離有情相離受者相性自空寂無我無作無自無他離五蘊界是蘊入界真實諦觀不可得故無自識故不可執持所以者何一切諸法本自無色無形無相離諸染著心亦不住內外兩間法本自性空寂清淨平等無二無染無著所以者何心本無相作茲觀者是修正觀量同法界與三昧俱法界法觀諦觀迦字謂一切法無執作義觀四種法一觀觀音二觀所印三觀自身如聖觀音四觀自心若圓明月光瑩透徹上圓行有母陀羅尼真言字字字皆金色右旋行轉是四種觀一時同觀而安誦念母陀羅尼真言七遍誦奮怒王真言七遍誦祕密心小心真言各百八遍以菩提心輪三昧印如是作者與三昧俱以少功用獲大成就惟除大小出入之時消息之時餘常場內靜心端坐諦觀西方極樂世界琉璃為地七寶宮殿樓閣欄楯寶幢華蓋寶池寶岸八功德水諸寶行樹一切寶藏寶師子座阿彌陀佛及諸如來現不可説殑伽俱胝那庾多等無量無邊神通光明一切好相觀音勢至諸大菩薩圍繞供養一切觀見若夢若覺而悉見之見彌陀佛伸手摩頂而告之言善哉善哉大善男子汝所修習不空王心母陀羅尼神變真言出世世間廣大解脫祕密壇印三昧耶者皆以成就汝此身後更不重受胎卵濕化蓮華化生從一佛土至一佛土乃至菩提更不墮落得此相者過去今身所作一切十惡五逆四重諸罪悉皆除滅身口意業悉皆清淨觀音菩薩畫像身上放大光明或觀世音變作淨行大婆羅門來行者前心所乞願悉皆滿足及得無量百千億數不可思議功德蘊身國王大臣一切人民愛樂親近供養恭敬此法號名世間最勝成就之法修此法者每於白月十四日時當自隨力請喚沙門婆羅門等施大施會而為供養持真言者乃可自食若欲常見阿彌陀佛一切諸佛諸大菩薩諸天神者每日當誦請召真言加持香王燒焯供養一切諸佛菩薩諸天香煙不斷作事誦持如是真言時別不闕恆於夢中覩見一切諸佛賢聖自見一切善不善事及得見他一切之事而皆報言此短受命此長受命此得可住此不可住此得可來此不可來此有大吉此有大凶心所觀者即便見之證此相者精進修法祕勿泄之壽命長遠祕密小心真言曰唵一鉢頭摩二合陀羅二阿慕伽上惹野泥三主嚕主嚕四娑嚩二合訶引五如是真言應當如法而誦之不空羂索祕密成就真言品第三發覺真言曰唵一鉢頭摩二合播捨陀羅二婀慕伽嚩囉娜三散注娜野𤙖四是呪加持香王燒焯供養亦加持白芥子香水十方散灑即手執持香爐啓白願言警覺十方一切諸佛菩薩一切天龍八部依時會壇作大加被次説請召真言曰唵一窒㘑二合𡀔枳耶二嚩訶野三婀慕伽播捨四鉢頭摩二合婆嚧枳多阿野都五步引嚩泥濕嚩二合囉六素嚕素嚕七弭摩犁𤙖八是呪加持香王加持香水白華閼伽十方啓請一切諸佛菩薩一切天龍八部即當集會為護衛之啓白真言曰唵一鉢𭉪摩二合步惹二摩訶播捨陀羅三儞漫怛囉二合野弭四娜婀慕伽嚩囉耶五步嚕二合步嚩莎嚩六畝嚕畝嚕𤙖七此呪加持其香燒焯供養啓曰一切諸佛菩薩一切天龍八部來集整儀本位而坐歡喜加護次復説結界真言曰唵一鉢𭉪摩二合阿姥伽二嚩馹囉二合地瑟𡛥娜三句嚕句嚕二合四莎嚩訶引五是呪加持白芥子水散灑壇地其地變成金剛界城七喻繕那外一切諸惡毗那夜迦藥叉羅剎精魅鬼神邪惡人民來相嬈者退散馳走目不敢視次復説神變真言曰唵一婀姥伽播捨二鉢𭉪牟二合哆囉三思孕二合何引娑娜覩四枲唎枲唎五莎嚩二合訶引是呪加持白芥子三散壇地其地變成金剛寶師子座若散坐處所坐之處地變成清淨寶蓮華座整淨衣服安詳念誦不久當得阿耨多羅三藐三菩提淨治所止之處清淨真言曰唵一摩訶迦嚕拏二鉢𭉪恾阿慕伽播捨三儞哩二合荼嚩馹囉二合地瑟恥二合哆四步嚕步嚕五嚩那嚩唎六莎嚩二合訶七是呪持真言者若至城邑聚落寺內山間蘭若屋舍宮殿壇場坐臥床敷經行道路喫食等處皆須加持白芥子若水即便灑散悉成清淨結界之處則令一切毗那夜迦不得其便金剛橛真言曰唵一鉢𭉪恾引姥伽播勢二娑漫哆三娜捨素引𩕳堀初二合四枲𤚥滿馱耶五都嚕都嚕𤚥是呪加持鑌鐵金剛橛量長八指加持五色線索七遍繫橛頭上釘於壇界則得七踰繕那成大結界其地乃至未拔橛去以來常為其界次復説結界空真言曰唵一婀姥伽引曼荼攞二合引滿馱耶二三曼帝娜三鉢𭉪迷二合四摩訶鉢𭉪迷二合引五度嚕度嚕六娑嚩二合訶引七是呪加持白芥子及水繞壇散灑成結大界能令一切天龍藥叉羅剎毗那夜迦怨讐等難不相侵繞而為障惱次復説治牛五淨真言曰唵一阿姥伽二婆哩戌悌三輸陀野四娑曼帝那五地唎地唎六戌陀薩埵摩訶鉢𭉪迷二合𤙖是呪加持五淨塗飾壇內若至一切山林樹下阿蘭若處園苑經行寺邑坊舍殿閣床榻汲水饌食等處但是行住坐臥作法之處一切悉以塗潔灑之皆得清淨能令一切藥叉羅剎毗那夜迦惡鬼神等於諸食時作供養時誦念時結界時坐禪時經行時臥時者脫衣時不得其便一切諸天悉皆擁護令無病惱一切垢障飢儉鬪諍惡星災變不吉祥相速當除滅持真言者若能如法加持五淨一切時中常用塗潔三淨常應自他服食速得不空羂索心王陀羅尼真言祕密曼拏羅印三昧耶現前成就若所去處永無障閡常為剎利沙門婆羅門居士庶類讚歎恭敬復常夢中得見七寶宮殿樓閣花林果樹一切善友而相樂見得身清淨觀世音菩薩當與諸願阿彌陀佛夢為現前若命終以直生西方極樂剎土次復説請法真言曰唵一鉢特迷二合二娑囉娑囉三底瑟𡛥底瑟姹四摩訶阿慕伽上三摩耶五莎嚩二合訶引六是法壇內誦一七遍啓白賢聖願受法者獲三昧耶次復説入壇真言曰唵一尾補囉鉢𭉪恾二合阿姥伽二鉢囉二合娑囉三鉢囉二合弭舍覩四矩嚕矩嚕五莎嚩二合訶引六是呪每入壇時則誦二十一遍入壇作法種種供養次復説散華真言曰唵一婀姥伽二婀努捨娑野三鉢𭉪恾四嚩入二合曼度𠼝𤙖是呪加持香花與授法者散於壇內次復説梳髮真言曰唵一阿姥伽鉢𭉪恾二合二始契三覩嚧覩嚧四底瑟𡛥五嚩馹囉二合引曼悌六莎嚩二合訶引是法加持梳頭髮結髮用之及加持手按授法者頂上也次復説罐索真言曰唵一婀姥佉鉢𭉪摩二若𡀔乞使二合波三避唎避唎四𤙖是呪加持罐索取水得水以復加持之乃任一切用之次復説水器真言曰唵一婀姥伽引弭迦吒二三皤囉鉢𭉪摩娑泥三若囉囉底四矩嚕矩嚕五𤙖是呪加持甕瓶等諸器中盛香水以用之也次復説灌頂真言曰唵一鉢𭉪恾二合鉢囉二合娑㘑二阿姥伽弭麼隸三皤囉皤囉四莎嚩二合訶引五是法如持七寶瓶置香水於中復加持置於壇內而用灌頂次復説吉祥真言曰唵一婀姥伽引鉢𭉪迷二合二素鉢𭉪迷二合三布唎拏迦隸四弭唎弭唎五迦摩㘑六莎嚩二合訶是呪若結印界燒香散華懸幡釘橛燒火設食若執數珠著脫衣服緣壇修治一切事法及讀誦經時皆加持手乃當執之則為十方諸佛菩薩一切天神而讚歎故次復説淨口真言曰唵一婀姥佉二弭麼隸爾嚩迦囉二合三思孕二合輸馱弭四鉢𭉪麼二合俱麼攞五爾嚩僧輸陀耶六馱囉馱囉七素弭摩唎八莎嚩二合訶是呪若欲讀誦懺悔禮拜讚歎諸佛菩薩之時先加持水揩洗口齒則得淨潔當得舌根清淨柔軟色如蓮形次復説含香真言曰唵一婀姥伽二健馱嚩底三素嚕素嚕四鉢囉二合噻普嚕五𮄽𬼨健悌六鉢𭉪摩鉢囉二合鞞七莎嚩二合訶如是真言三昧耶當以上好白檀香那羅那香赤蓮華畢里迦香鬱金香躬矩麼香蓮華鬢七物數各十二分又加龍腦香附子二數量等各四分搗治石蜜而和合每念誦時加持含便當口氣而香潔如鬱鉢囉華之香常得諸佛觀世音歡喜祐護而讚歎胸藏痰飲吐逆病便得銷鑠而除差三十三天聞讚誦陀羅尼聲喜敬護有情得聞此人聲皆得除惱而相愛恆常如法含香者大辨才天密神通隱入舌端辨無礙先所忘失令憶知發聲大稱𤙖字者聲聲而滿於七聲諸真言神天仙衆立至壇中皆擁護又重怒聲稱怖字聲聲而滿於七聲衆惡毗那夜迦等鬼神魅精怖馳散長含此香讀誦者一切善相自然現垢重罪纍皆消滅恆無非人橫干嬈次復説澡浴藥真言曰唵一弭麼攞弭誐帝二鉢𭉪麼弭嚩㘑三三嚩囉者㘑四濕嚩哩𤙖五婀姥伽悉悌六輸陀野𤙖如是真言三昧耶當以龍華丁香皮烏施羅香甘松香白栴檀香蓮華鬢零陵翳羅白豆蔲哆誐囉香鬱金香鉢羅莽拏唎迦藥射莫迦藥丁香花塢迦囉乾地迦藥如是數各皆等分精潔合治雨水和當澡浴時加持用和湯如法清淨浴膚體娧澤香芬馥蠲除災厄滌垢穢清淨如法而誦念行住坐臥無悚怖一切諸惡天龍神毗那夜迦怨讐輩自然消息喜無障常以此藥和湯浴當知是人速成驗諸佛菩薩諸天神喜悅瞻護與上願次復説眼藥真言曰唵一阿祇曳二合鉢𭉪摩嚧者泥二𮄽弭也二合𡫸哩二合瑟微三鉢哩戍悌四素嚕素嚕五鉢𭉪麼乞使二合六步嚕步嚕七娑曼哆八弭野婆路枳𩕳九莎嚩二合訶引如是真言三昧耶雄黃牛黃各一分青優鉢囉華海末二物各數十三分精治研之石蜜和清水和研加持用點眼眼眵翳瞙除諸佛觀見皆歡喜諸惡鬼神不相障夢恆吉善眼根淨次復説牛黃真言曰唵一勃地野二合勃地野二合弭勃地野二合二鉢𭉪摩引姥伽目棄三者囉者囉四嚩囉泥莎嚩二合訶引五如是真言三昧耶而復加持於牛黃用母陀羅尼真言及奮怒王真密言亦用祕密心真言加持點額行作法即令一切惡鬼神毗那夜迦之等類皆悉畏伏而怖走譬夜火聚禽獸見而皆畏懼便馳散除諸障者之怖異若沙門僧婆羅門并諸人民見皆敬諸陀羅尼真言神住壇內者喜瞻眺增加守護而不怠若行道路野山澤溪澗溝壑一切處不畏盜賊蠱毒藥惡風雷電霹靂難師子虎狼惡獸難蚖蛇蝮蝎諸災難若真言者點此藥繫心常須憶念我誦持不空真言者我則至前加被護如是不空羂索心母陀羅尼真言法菩提衆願三昧耶如是護者是諸佛慈悲實語加被我亦是不空羂索心母陀羅尼真言法祕密壇印三昧力復是行者所精誠求於菩提之願力是故我得進此人令滿心所希求願若有衆生不依法但為活命行諂偽誑他破壞犯梵行或復處所不清淨我即不得為成現所以有何得如是由不如法修行法以斯義故持法者應當如法悃御心內外清淨修治法決定成就諸法門次復説瓔珞真言曰唵一婀姥迦俱捨陀羅二薩囉鉢囉二合𤙖三此呪加持白線當使童女合之如筯等兩股三條是三條索兩頭中心同為一結皆誦真言結之總結三結兩頭繫續持真言者常絡髆佩飾次復説著衣真言曰唵一婀姥伽引鉢囉二合嚩羅拏二畝嚕哩三𮄽地也二合迦始迦引三皤嚩覩四哆囉哆囉五莎嚩二合訶引此呪加持衣服而貫著之次復説脫衣真言曰唵一婀姥伽引噻嚩怛囉二合二窟律二合乞使二合波弭姥地禰三鉢𭉪迷二合四噻訶引此呪出入道場喫食經行坐臥等時加持其手解脫衣服置於淨處重復加持之次復説洗浴真言曰唵一𮄽瓢娜迦二三步哆引阿姥伽三皤嚕拏嚩㘑四阿鼻詵者五𤙖此呪加持香湯灌洗浴身次復説洗手面真言曰唵一婀弭㗚哆阿姥伽二鉢𭉪恾二合娑洗三嚩唎灑抳四主嚕主嚕二合莎嚩二合訶此呪加持淨水洗手洗面漱沐口齒次復説護身真言曰唵一婀姥伽引嚩唎灑抳二矩嚕矩嚕三莎嚩二合訶引此呪加持白芥子及水散灑身上一切非人不能得便護他亦爾次復説授法真言曰唵一婀慕佉三摩野二摩訶鉢𭉪迷二合三底瑟吒底瑟吒四𤙖此呪若授法者入壇門時其阿闍梨執手加持引入壇門次復説護同伴真言曰唵一薩嚩怛囉二合二阿慕伽嚩底三底瑟吒引𡀩乞灑覩四𤙖五此呪加持淨灰與弟子同伴點於額上則成擁護次復説整儀真言曰唵一窒㘑𡀔枳耶二合二鉢𭉪摩三阿姥佉吽迦囉二合摩抳四弭哩弭哩五莎嚩二合訶引六此呪加持真言者壇內作法而供養者加持自身入於場界更勿觸突佛菩薩像真言神座如法整理修諸法事次復説寶索真言曰唵一鉢𭉪迷二合引摩訶鉢𭉪迷二合二娑囉娑囉三三曼帝娜四鉢哩二合迷瑟吒二合耶五阿慕伽播勢引曩六虎嚕虎嚕七莎嚩二合訶引是呪加持五色線索圍壇外界為強畔門懸幡次復説懸幡真言曰唵一弭只怛囉二合阿姥伽二嚩噻怛囉二合那娜楞伽三弭戍馱野四枳抳枳抳五𤙖此呪若懸幡時畫幡時皆以印加持之當即懸之畫亦依此次復説箭真言曰唵一婀姥伽捨囉二嚩惹囉頓拏三詫囉詫囉四莎嚩二合訶引此呪加持其箭插持畫箭亦爾次復説開壇門真言曰唵一尾補囉婀姥伽二摩訶𭉪嚩囉尾戍悌三枲唎枲唎四娑嚩二合訶引五此呪若受法者入壇時加持壇門了便即入壇門同入於一切佛剎諸妙宮殿次復説淨花真言曰唵一那那弭質怛囉二合阿姥伽三補澀波叵囉四攞哆引枳喇拏五補囉野六皤囉皤囉七𤙖八此呪加持種種枝柯花葉插瓶口中又以五色線繫瓶項上又加持之布置壇內次復説香爐真言曰唵一婀姥伽引𡃤怛那二弭摩娜三迦吒四入嚩地瑟恥二合多五𮄽健度入嚩囉引六噻叵囉拏七三曼底娜八入嚩囉九莎嚩二合訶引此呪加持香爐執置壇內燒香供養次復説寶瓶真言曰唵一惹囉嚩底二唎怛那伽吒三娑里抳四覩微覩微五莎嚩二合訶此法加持寶瓶盛蘇乳酪飯敷置供養次復説寶器真言曰唵一𮄽名野二合皤惹那二阿姥伽三鉢𭉪恾嚩㘑四補囉野補囉野五𤙖此呪加持瓷器當用供養次復説閼伽真言曰唵一婀姥伽引三補囉抳二訥嚧二合拏引健馱嚩底三莎嚩二合訶此法加持閼伽當用供養次説君持真言曰唵一薩囉抳娑囉耶二婀姥伽皤惹泥三麼馱麼馱禰四𤙖此三昧耶加持君持以用供養次説分界位真言曰唵一𮄽弭野二合嚩𡀔迦禰二阿弭皤惹野都三娑曼底曩四薩囉薩麼引嚩娑引囉特五莎嚩二合訶引此呪列壇街道界位加持壇地然後分別街道界位如法圖畫次説畫像真言曰唵一那那跛囉二合喝拏三阿姥伽四沒捺囉五入嚩攞入嚩攞莎嚩二合訶引此法於壇內畫諸像時及畫了時於諸位中總都加持之次復説繩界真言曰唵一婀姥伽唎怛娜二蘇怛囉二合嚩𭋺三枳柅枳柅四莎嚩二合訶引此呪加持五色線繩於其壇上周圍括量一切界位或於壁上白㲲絹上欲畫像時皆以是線和朱括量為諸賢聖稱讚功德次説列門真言曰唵一尾補囉嚩𭋺二跛囉𡀎捨耶三婀姥伽鉢𭉪迷二合四𤙖此法畫壇門時加持門地乃畫壇門次復説金器真言曰唵一𩕳弭野二合惹那二阿姥伽幹者娜引嚩㘑三枳哩枳哩四𤙖此呪加持金器當用供養次復説銀器真言曰唵一三補唎拏二嚧比野二合𮄽弭野三皤惹泥四阿姥伽鉢𭉪迷二合莎嚩二合訶引此三昧耶加持銀器當用供養次復説飯食真言曰唵一弭弭陀二嚕跛訶嚕播三迦囉拏四者囉者囉五阿姥伽嚩底六莎嚩二合訶引此呪加持種種甘膳飲食盛供養之次復説泛花真言曰唵一𮄽𬼨健馳二拏婆哩抳三婀姥伽引惹㘑四馱囉馱囉五莎嚩二合訶此法加持衆花水上泛之常為供養次説燒香真言曰唵一健馱噻叵囉二合抳二三曼哆引迷伽三吡囉二合噻普囉𤙖此呪每時別加持香燒供養一切諸佛菩薩金剛諸天等次説塗壇真言曰唵一𮄽麼囉二迦耶引輸馱禰三𮄽弭野二合健馱跛囉布囉抳布囉野布囉野𤙖此呪加持香泥香水摩壇供養宗睿録云不空羂索陀羅尼儀軌一部二卷阿目伽三藏譯功能如本經不能具記三十五紙重譽深密鈔平等房十卷抄等引用此軌焉此軌者與唐菩提流志所譯三十卷不空羂索經一二兩卷同本其綴文亦大同然於母陀羅尼句句致譯以為腳注是其異也粗得語義其益不鮮矣蓋梵本殘缺彼三十卷經於成就真言品更有末香塗香等三十種呪今缺無惜哉延寶三年八月於洛西般若寺以栂尾明慧上人御持本一挍訖般若寺寓住沙門淨嚴三十七歲天明元辛丑年夏六月九日以覺遠僧正之本寫得此日炎蒸如燬拭汗閣筆於南杉寮同月二十日以宇治慧心院本再挍之洛東智積教院留學沙門慈忍享和改元辛酉年六月請求彼本以挍三十卷經而加國字授工者上木行於同志之所焉豐山妙音輪下總持院沙門快道志享和癸亥三月二十二日一校畢慈順文政三年庚辰四月十三日右以傳校之本於東武湯島金剛寶山衙寮一校之了龍肝
